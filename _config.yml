###########################################################
### Benvenuto su Beautiful Jekyll!
### Questo file di configurazione gestisce le impostazioni globali del sito.
###########################################################

############################
# --- Opzioni Richieste --- #
############################

# Nome del sito web
title: I Quaderni delle Scienze

# Il tuo nome che apparirà nel piè di pagina (footer)
author: "Quaderni delle Scienze"

###############################################
# --- Lista dei link nella barra di navigazione --- #
###############################################

navbar-links:
  "Informazioni": "aboutme"
  "Risorse":
    - Beautiful Jekyll: "https://beautifuljekyll.com"
    - Impara il Markdown: "https://www.markdowntutorial.com/"



################
# --- Logo --- #
################

# Immagine nella barra di navigazione (inserisci il nome esatto con cui lo carichi)
avatar: "/assets/img/logo.png"

# IMPOSTA SU FALSE: il tuo logo è già rotondo. Disattivando il ritaglio CSS del tema,
# eviti che i bordi esterni del cerchio arancione vengano accidentalmente smussati o distorti.
round-avatar: false


#####################################
# --- Link Social nel Footer --- #
#####################################

# Rimuovi il cancelletto (#) dalle righe che vuoi attivare e inserisci i tuoi dati
social-network-links:
  email: "someone@example.com"
  rss: true
#  facebook: iltuonome
#  github: iltuonome
#  twitter: iltuonome
#  youtube: "@iltuonome"
#  linkedin: iltuonome
#  instagram: iltuonome
#  telegram: iltuonome

rss-description: "Feed RSS dei Quaderni delle Scienze"

###########################
# --- Opzioni Generali --- #
###########################

# Pulsanti di condivisione social attivi nei post
share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false
  reddit: false

# Come mostrare il link del tuo sito nel footer
url-pretty: "quadernidellescienze.github.io"

# Aggiunge il titolo del sito al titolo di ogni pagina del browser
title-on-all-pages: true

# Lunghezza dell'anteprima del testo (in parole) nella home page
excerpt_length: 50

# Mostra l'anteprima del testo per ogni articolo nella home
feed_show_excerpt: true

# Mostra la lista dei tag sotto ogni articolo nella home
feed_show_tags: true

# Aggiunge il pulsante di ricerca nella barra dei menu
post_search: true

# Aggiunge un pulsante nel footer per modificare al volo la pagina su GitHub
edit_page_button: true

# Permette ai sotto-menu di essere più lunghi della voce principale
navbar-var-length: false

######################################
# --- Colori e Personalizzazioni --- #
######################################

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

###########################################
# --- Stringhe per la lingua Italiana --- #
###########################################

language: "it-IT"
str_website: "Sito web"
str_page: "Pagina"
str_posts: "Articoli"
str_tags: "Tag"
str_search_placeholder: "Cerca articoli..."
str_no_results: "Nessun risultato trovato"
str_read_time: "minuti di lettura"
